

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Уроци — добавяне</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; 
      padding: 24px; 
      background: #f2f2f2; /* light gray */
    }
    h1 { text-align: center; }
    .wrap { max-width: 900px; margin: 0 auto; }
    fieldset { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    legend { padding: 0 8px; color: #333; }
    label { display: block; margin: 8px 0 4px; font-weight: 600; }
    input[type="text"], input[type="url"], input[type="number"], textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px; }
    textarea { min-height: 90px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .btn { display: inline-block; padding: 8px 14px; border-radius: 8px; border: 1px solid #c3d2e5; background: #e9f1ff; cursor: pointer; font-weight: 600; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .btn-plain { background: #fff; }
    .list { margin-top: 8px; }
    .list .item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .list .item input { flex: 1; }
    .item .rem { border: 1px solid #999; background: #fff; width: 32px; height: 32px; border-radius: 6px; }

    /* Drag & drop styling */
    .list .item { cursor: grab; }
    .list .item:active { cursor: grabbing; }
    .list .item.dragging { opacity: 0.6; outline: 2px dashed #9ca3af; background: #f8fafc; }
    .list .item.placeholder { height: 36px; border: 2px dashed #cbd5e1; border-radius: 6px; margin-bottom: 6px; }
    /* Drag rows for exercises table */
    #ex_table_body tr.row-item { cursor: grab; }
    #ex_table_body tr.row-item:active { cursor: grabbing; }
    #ex_table_body tr.row-item.dragging { opacity: 0.6; outline: 2px dashed #9ca3af; background: #f8fafc; }
    .success { border-left: 4px solid #18a957; padding: 8px 12px; background: #eaf9f0; border-radius: 8px; }
    .error { border-left: 4px solid #c62828; padding: 8px 12px; background: #fde8e8; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 24px; }
    th, td { border-bottom: 1px solid #eee; padding: 8px 10px; text-align: left; }
    th { background: #fafafa; }

    /* Small button variant */
    .btn-small { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

    /* Flash highlight for autofilled fields */
    @keyframes flashFill {
      0%   { background-color: #e6f9ed; }
      70%  { background-color: #f2fcf6; }
      100% { background-color: transparent; }
    }
    .flash-fill {
      animation: flashFill 900ms ease-out 1;
    }

    /* Badge for edit/new mode */
    .mode-badge { font-size: 12px; padding: 4px 8px; border-radius: 999px; border: 1px solid #cbd5e1; background:#f8fafc; color:#0f172a; display:inline-block; }
    .mode-badge.edit { background:#fff7ed; border-color:#fdba74; color:#9a3412; }

    /* Bottom table: one-line rows with horizontal scroll in cells */
    #recentTable { table-layout: fixed; }
    #recentTable th, #recentTable td { white-space: nowrap; overflow-x: auto; overflow-y: hidden; }
    #recentTable th { position: sticky; top: 0; z-index: 1; }
    /* Narrower, fixed widths via colgroup */
    #recentTable col.id    { width: 70px; }
    #recentTable col.stat  { width: 110px; }
    #recentTable col.trip  { width: 160px; }
    #recentTable col.desc  { width: 320px; }
    #recentTable col.cls   { width: 80px; }
    #recentTable col.upd   { width: 140px; }
    /* Status tags */
    .status-tag { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; border:1px solid #cbd5e1; background:#f8fafc; color:#0f172a; }
    .status-tag.new { background:#e6f9ed; border-color:#86efac; color:#166534; }
    .status-tag.updated { background:#eef2ff; border-color:#93c5fd; color:#1e3a8a; }

    .row {
      gap: 42px;
    }
    .lessonClassRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 28px;
      width: 100%;
    }

    .rowClassLesson {
      display: flex;
      justify-content: space-between;
    }

    .lessonClassRow > div {
      width: 100%;
      min-width: 0;
    }

    .lessonClassRow input {
      width: 100%;
      max-width: none;
      box-sizing: border-box;
    }.lessonClassRow {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 28px;
  width: 100%;
}

.lessonClassRow > div {
  width: 100%;
  min-width: 0;
}

.lessonClassRow input {
  width: 100%;
  max-width: none;
  box-sizing: border-box;
}

.row > .lessonClassRow {
  grid-column: 1 / -1;
  width: 100%;
}

.lessonClassRow {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  width: 100%;
}

.lessonClassRow > div {
  min-width: 0;
}

.lessonClassRow input {
  width: 100%;
}

.row3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 42px;
  width: 100%;
}

.row3 > div {
  min-width: 0;
}

.row3 input {
  width: 100%;
}

 </style>
</head>
<body>
  <div class="wrap">
    <h1>Добавяне на урок</h1>

    <fieldset style="margin-top:10px;">
      <legend>Търсене по снипет (ID)</legend>
      <div class="row">
        <div>
          <label for="snippetSearch">Въведи ID на снипет (може и частично)</label>
          <input id="snippetSearch" type="text" placeholder="напр. 27001 или 27001001" />
        </div>
        <div>
          <label>&nbsp;</label>
          <div style="display:flex; gap:8px; align-items:center;">
            <button id="snippetSearchBtn" class="btn" type="button">Търси</button>
            <button id="loadBySearchBtn" class="btn btn-small" type="button">Зареди</button>
          </div>
        </div>
      </div>
      <div id="snippetResults" class="row">
        <div>
          <strong></strong>
          <ul id="snippetCompletions" style="margin-top:6px; padding-left:18px;"></ul>
        </div>
        <div>
          <strong></strong>
          <div id="snippetLessonsWrap" style="max-height:220px; overflow:auto; border:1px solid #eee; border-radius:8px; padding:6px;">
            <table style="width:100%; border-collapse:collapse;">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Триплет</th>
                  <th>Тема</th>
                  <th>Клас</th>
                  <th>Инфо</th>
                </tr>
              </thead>
              <tbody id="snippetLessons"></tbody>
            </table>
          </div>
        </div>
      </div>
    </fieldset>

    <form id="lessonForm" autocomplete="off">
      <fieldset>
        <div>
          <label for="lessonId">lesson_id</label>
          <input id="lessonId" type="number" placeholder="ID на урока" />
        </div>
        <div style="display:none;">
            <label>Име на урока</label>
            <input id="lessonName" type="text" ...>
          </div>

        <legend>Основни</legend>
      
        <div class="row">
        
          <div class="lessonClassRow">
          <div>
            <label>Клас</label>
            <input id="lessonClass" type="number" placeholder="напр. 9" />
          </div>

          <div>
            <label>Паралелка</label>
            <input id="lessonDivision" type="text" placeholder="напр. А" />
          </div>
        </div>
          
        </div>
        <div class="row3">
          <div>
            <label for="source_token">source_token</label>
            <input id="source_token" type="number" placeholder="напр. 27001" />
          </div>
          <div>
            <label for="section_token">section_token</label>
            <input id="section_token" type="number" placeholder="напр. 12" />
          </div>
          <div>
            <label for="lesson_token">lesson_token</label>
            <input id="lesson_token" type="number" placeholder="напр. 3" />
          </div>
        </div>
        <div class="row">
          <div>
            <label for="tripplet_id">Триплет (текст)</label>
            <input id="tripplet_id" type="text" placeholder="напр. 027001001 или 027.001.001" />
          </div>
          <div>
            <!-- empty column for alignment / future use -->
          </div>
        
        </div>
        <label for="description">Тема</label>
        <textarea id="description" placeholder="Кратко описание на урока"></textarea>
        <label for="description2">Описание</label>
        <textarea id="description2" placeholder="Допълнително описание / бележки към урока"></textarea>
        <div class="row">
          <div>
            <label for="url">URL</label>
            <input id="url" type="url" placeholder="https://..." />
          </div>
          <div>
            <label for="filepath">Файл (път)</label>
            <input id="filepath" type="text" placeholder="/Users/.../file.pdf" />
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Под-списъци</legend>
        <div class="row">
          <div>
            <label>Теория — snippets</label>
            <table id="sn_table" style="width:100%; border-collapse:collapse; margin-top:6px;">
              <thead>
                <tr>
                  <th style="width:110px;">ID</th>
                  <th style="width:160px;">Продълж. (мин)</th>
                  <th style="width:140px;">Сложност</th>
                  <th style="width:46px;"></th>
                </tr>
              </thead>
              <tbody id="sn_table_body"></tbody>
            </table>
            <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
              <input id="sn_add_id" type="number" min="1" placeholder="въведи ID" style="max-width:160px;"/>
              <button type="button" class="btn btn-plain" id="addTheory">+ Добави</button>
            </div>
          </div>
          <div>
            <label>Упражнения</label>
            <table id="ex_table" style="width:100%; border-collapse:collapse; margin-top:6px;">
              <thead>
                <tr>
                  <th style="width:110px;">ID</th>
                  <th style="width:160px;">Продълж. (мин)</th>
                  <th style="width:140px;">Сложност</th>
                  <th style="width:46px;"></th>
                </tr>
              </thead>
              <tbody id="ex_table_body"></tbody>
            </table>
            <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
              <input id="ex_add_id" type="number" min="1" placeholder="въведи ID" style="max-width:160px;"/>
              <button type="button" class="btn btn-plain" id="addEx">+ Добави</button>
            </div>
          </div>
        </div>
      <details id="ref_details" style="margin-top:14px;">
        <summary class="btn btn-plain" style="list-style:none; display:inline-flex; align-items:center; gap:8px; cursor:pointer;">
          Информация (ID · Вид · Инфо)
        </summary>
        <div style="margin-top:10px;">
          <table id="ref_table" style="width:100%; border-collapse:collapse; margin-top:6px;">
            <thead>
              <tr>
                <th style="width:110px;">ID</th>
                <th style="width:130px;">Вид</th>
                <th>Инфо</th>
              </tr>
            </thead>
            <tbody id="ref_table_body"></tbody>
          </table>
        </div>
      </details>
      </fieldset>

      <div style="display:flex; justify-content:space-between; align-items:center; margin:8px 0 6px;">
        <span id="editModeBadge" class="mode-badge">Режим: нов запис</span>
      </div>
      <div style="display:flex; gap:12px; justify-content:flex-end;">
        <button id="submitBtn" class="btn primary" type="submit">
          Запази урока
        </button>
        <button id="resetBtn" class="btn btn-plain" type="reset">Изчисти</button>
      </div>
    </form>

    <div id="msg" style="margin-top:16px;"></div>

    <h2>Последно добавени</h2>
    <table id="recentTable">
      <colgroup>
        <col class="id" />
        <col class="stat" />
        <col class="trip" />
        <col class="desc" />
        <col class="cls" />
        <col class="upd" />
      </colgroup>
      <thead>
        <tr>
          <th>ID</th>
          <th>Статус</th>
          <th>Триплет</th>
          <th>Тема</th>
          <th>Клас</th>
          <th>Обновен</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="./lessonsCenter.js"></script>
  <!-- Sticky Notes for Lessons Center (right side by default) -->
<script>
  window.YSN_KEY = 'lessonsCenter';
</script>
<script src="/yellowStickyNotes.js"></script>
</body>
</html>
