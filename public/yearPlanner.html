<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Year Planner</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #f9f9f9;
      padding: 20px;
    }
    h2 {
      text-align: center;
    }
    form {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: bold;
    }
    input[type="date"] {
      width: 100%;
      padding: 8px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h2>📆 Year Planner Setup</h2>
  <form id="yearPlannerForm">
    <label for="startYearDate">Start of Academic Year:</label>
    <input type="date" id="startYearDate" name="startYearDate" required>

    <label for="endYearDate">End of Academic Year:</label>
    <input type="date" id="endYearDate" name="endYearDate" required>

    <label for="endSemester1">End of Semester 1:</label>
    <input type="date" id="endSemester1" name="endSemester1" required>

    <label for="startSemester2">Start of Semester 2:</label>
    <input type="date" id="startSemester2" name="startSemester2" required>

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;">
    <button id="generatePlanBtn" type="button">Generate Plan</button> 
    
    </div>

  </form>

  <hr style="margin: 30px 0;">
  <h3>📋 Current Schedule Info</h3>
  <pre id="currentScheduleInfo" style="white-space: pre-wrap; background: #f1f1f1; padding: 12px; border-radius: 6px;"></pre>

  <h3>🕒 Weekly Schedule (Time & Days)</h3>
  <pre id="weeklyScheduleInfo" style="white-space: pre-wrap; background: #eef; padding: 12px; border-radius: 6px;"></pre>
<script type="module" src="/yearPlanner.js"></script></body>
</html>
