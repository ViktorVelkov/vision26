<!doctype html>
      <html lang="bg">
      <head>
        <meta charset="utf-8" />
        <title>Оценяване — {{CLS}} — {{TRIPLET}}</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <style>
          body{font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; margin:16px;}
          header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}
          .muted{color:#9aa0a6;font-style:italic}
          /* --- Assessment Log panel (hidden, toggled) --- */
          .log-toggle { margin-left:auto; }
          .log-panel { position:fixed; top:24px; right:24px; width:420px; max-height:70vh; overflow:auto; background:#fff; border:1px solid #e6e6e6; border-radius:10px; box-shadow:0 6px 22px rgba(0,0,0,.12); padding:10px; z-index:9999; }
          .log-panel[hidden] { display:none; }
          .log-panel header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
          .log-panel h4 { margin:0; font-size:1rem; }
          .log-panel .close-btn { border:none; background:#f3f4f6; border-radius:6px; padding:4px 8px; cursor:pointer; }
          .log-table { width:100%; border-collapse:collapse; font-size:0.92rem; }
          .log-table th, .log-table td { padding:6px 8px; border-bottom:1px solid #eee; text-align:left; }
          .log-table thead th { position:sticky; top:0; background:#f9fafb; z-index:1; }
          .topline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
          .badge{background:#f1f5f9;color:#374151;border-radius:6px;padding:2px 8px;font-weight:600;font-size:.8rem}
          .small{font-size:.78rem;color:#777}
          .nav{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
          .btn{background:#6b7280;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-weight:600;cursor:pointer}
          .btn:disabled{background:#d1d5db;color:#ffffff;cursor:not-allowed}
          .btn--ghost{background:#f3f4f6;color:#374151}
          .wrap{max-width:900px;margin:56px auto 0;display:flex;flex-direction:column; align-items:center}
          .card{border:1px solid #e7e7e7;border-radius:12px;padding:16px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.06);overflow:hidden;max-width:720px;width:100%;}
          .card h2{margin:0 0 8px 0;font-size:1.25rem;text-align:center;font-weight:600;}
          .hero{height:40px;margin:-16px -16px 12px -16px;border-radius:12px 12px 0 0;background:#eef2ff;transition:background 200ms ease-in-out;filter:saturate(0.85) brightness(1.03);}
          .sub{font-size:.9rem;color:#666;margin-bottom:8px}
          ul.skills{list-style:none;padding-left:0;margin:0}
          .skills li{padding:6px 0;border-bottom:1px solid #f2f2f2}
          .skill-row{display:flex;align-items:center;gap:12px}
          .sk-name{flex:1;}
          .rating{display:inline-flex;gap:6px;align-items:center}
          .pill{min-width:28px;height:28px;border:1px solid #000;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-weight:600;cursor:pointer;user-select:none;color:#000;background:#fff}
          .pill:hover{background:#f3f4f6}
          .pill.is-active{background:#3b82f6;color:#fff;border-color:#3b82f6}
          .pill--v0.is-active{background:#ef4444;border-color:#ef4444;color:#fff}
          .pill--v1.is-active{background:#f59e0b;border-color:#f59e0b;color:#fff}
          .pill--v2.is-active{background:#3b82f6;border-color:#3b82f6;color:#fff}
          .pill--v3.is-active{background:#22c55e;border-color:#22c55e;color:#fff}
          /* Note field shown only for added tasks */
          .task-note{flex:1;min-width:160px;border:1px solid #d1d5db;border-radius:6px;padding:4px 6px;font:inherit}
          .task-note::placeholder{color:#94a3b8}
          .task-skills{flex:1;min-width:80px;max-width:120px;border:1px solid #d1d5db;border-radius:6px;padding:4px 6px;font:inherit}
          .task-skills::placeholder{color:#94a3b8}
          /* Inline per-skill comment add button */
          .add-note-btn{border:none;background:transparent;cursor:pointer;font-weight:700;opacity:.5;transition:opacity .15s ease;padding:2px 6px;margin-left:4px}
          .add-note-btn:hover{opacity:1}
          .skill-inline-note{flex:1;min-width:160px;border:1px solid #d1d5db;border-radius:6px;padding:4px 6px;font:inherit}
          .skill-inline-note::placeholder{color:#94a3b8}
          .notes {margin-top:12px;display:flex;align-items:center;gap:10px;}
          .notes-label {margin:0;font-weight:600;color:#374151;white-space:nowrap;}
          .notes-ta{width:90%;min-height:1.8em;max-height:1.8em;resize:both;border:1px solid #d1d5db;border-radius:8px;padding:8px 10px;font:inherit}          .notes-ta:focus{outline:none;box-shadow:0 0 0 3px rgba(59,130,246,.2);border-color:#3b82f6}
          .notes-ta{
            width:90%;
            min-height:1.8em;
            max-height:1.8em;
            resize:both;
            border:1px solid #d1d5db;
            border-radius:8px;
            padding:8px 10px;
            font:inherit;
            transition:none; /* важно за безфликерно показване */
          }
          .notes-status{margin-top:4px}
          .footer-hint{position:fixed;left:0;right:0;bottom:12px;text-align:center;color:#666;font-size:.85rem}
          .toolbar{display:flex;gap:8px;align-items:center}
          select{
            padding:6px 8px;
            border:1px solid #d1d5db;
            border-radius:6px;
            background:#f3f4f6;
            color:#374151;
            appearance:none; -webkit-appearance:none; -moz-appearance:none;
            background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M6 8l4 4 4-4" stroke="%236b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>');
            background-repeat:no-repeat; background-position:right 8px center; background-size:16px 16px;
            padding-right:28px;
            cursor:pointer;
          }
          select:hover{ background:#eee; }
          select:focus{ outline:none; box-shadow:0 0 0 3px rgba(107,114,128,.25); border-color:#9ca3af; }
          /* --- Collapsible search panel styles --- */
          .search-panel{max-width:900px;margin:8px auto 0}
          .search-panel .sp-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
          .iconbtn{border:1px solid #d1d5db;background:#fff;border-radius:8px;min-width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
          .iconbtn:hover{background:#f3f4f6}
          .search-panel.is-collapsed .search-row{display:none}
          .search-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;margin:8px auto 0;max-width:900px}
          .scol{flex:1 1 420px;min-width:320px;background:#fff;border:1px solid #e7e7e7;border-radius:12px;padding:10px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
          .scol header{display:flex;gap:8px;align-items:center;margin-bottom:8px}
          .scol input[type="text"]{flex:1;padding:6px 8px;border:1px solid #d1d5db;border-radius:6px}
          .result-box{max-height:240px;overflow:auto;border:1px solid #e7e7e7;border-radius:8px;background:#fff}
          table.mini-table{width:100%;border-collapse:collapse}
          .mini-table thead th{position:sticky;top:0;background:#f7f7f7;z-index:1}
          .mini-table th,.mini-table td{padding:6px 8px;border-bottom:1px solid #eee;font-size:.9rem;text-align:left}
          .sk-id{font-size:.8rem;color:#94a3b8;margin-left:8px}
          /* --- Add/Assign buttons in left results --- */
          .add-cell{display:flex;gap:8px;align-items:center}
          .circle-btn{
            width:28px;height:28px;border:1px solid #cbd5e1;border-radius:50%;
            display:inline-flex;align-items:center;justify-content:center;
            background:#fff;color:#111;font-weight:700;cursor:pointer
          }
          .circle-btn:hover{background:#f1f5f9}
          .circle-btn:active{transform:translateY(1px)}
          /* Hide duplicate ID column in the left search results (2nd column = ID) */
          #leftResultsTable thead th:nth-child(2),
          #leftResultsTable tbody td:nth-child(2){
            display:none;
          }
         .skill-inline-note {
            display: none; /* ← скрито по подразбиране */
            flex: 1;
            min-width: 160px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 4px 6px;
            font: inherit;
          }   
        
        .card.card--secondary{margin-top:12px}
        .added-header{display:flex;align-items:center;justify-content:space-between;margin:0 0 8px 0}
        .added-header h3{margin:0;font-size:1.05rem}
        .added-list{list-style:none;margin:0;padding-left:0}
        .added-list li{display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid #f2f2f2}
        .added-label{flex:1}
        .remove-task{border:1px solid #ef4444;background:#fff;color:#ef4444;border-radius:6px;padding:4px 8px;cursor:pointer}
        .remove-task:hover{background:#fee2e2}
        .muted-note{color:#9aa0a6;font-style:italic}
        .task-controls{display:flex;align-items:center;gap:12px;margin-left:auto}
        .task-rating{display:inline-flex;gap:6px;align-items:center}
          </style>
</head>
      <body>
        <header>
          <div class="topline">
            <div class="badge">{{CLS}}</div>
            <div class="badge">Triplet: {{TRIPLET}}</div>
            <div class="badge" id="lessonBadge"></div>
            <span class="small" id="metaCount"></span>
          </div>
          <div class="nav">
            <button id="prevBtn" class="btn btn--ghost" title="Предишен (←)">← Предишен</button>
            <button id="nextBtn" class="btn" title="Следващ (→)">Следващ →</button>
            <div class="toolbar">
              <label for="studentPicker" class="small">Към ученик:</label>
              <select id="studentPicker"></select>
            </div>
            <button id="undoBtn" class="btn btn--ghost" title="Отмени последното действие" disabled>Отмени</button>
            <button id="submitAssessBtn" class="btn btn--ghost">Подай</button>
          </div>
        </header>
        <!-- Добавяне не задачите, индивидуално или поединично -->
        <section class="search-panel is-collapsed" id="searchPanel">
          <div class="sp-head">
            <button id="toggleSearchPanelBtn" class="iconbtn" title="Покажи/Скрий търсене">▸</button>
            <span class="sp-title small">Задачи</span>
          </div>
          <section class="search-row" id="assessmentSearchRow">
            <div class="scol" id="leftSearchCol">
              <header>
                <input id="leftSearchInput" type="text" placeholder="Търси… (по код)">
                <button id="leftSearchBtn" class="btn btn--ghost">Търси</button>
              </header>
              <div class="result-box">
                <table class="mini-table" id="leftResultsTable">
                  <thead><tr id="leftHead"></tr></thead>
                  <tbody id="leftBody"><tr><td class="muted">Няма резултати</td></tr></tbody>
                </table>
              </div>
            </div>

            <div class="scol" id="rightSearchCol">
              <header>
                <input id="rightSearchInput" type="text" placeholder="Търси… (по snippets)">
                <button id="rightSearchBtn" class="btn">Търси</button>
              </header>
              <div class="result-box">
                <table class="mini-table" id="rightResultsTable">
                  <thead><tr id="rightHead"></tr></thead>
                  <tbody id="rightBody"><tr><td class="muted">Няма резултати</td></tr></tbody>
                </table>
              </div>
            </div>
          </section>
        </section>

        <main class="wrap">
          <section class="card">
            <div id="hero" class="hero"></div>
            <h2 id="studentName">—</h2>

            <div class="notes">
              <label for="studentNotes" class="notes-label">Коментари</label>

              <div id="notesStatus" class="notes-status small muted"></div>
            </div>
          </section>

              <span class="small muted" id="addedTasksCount">0</span>
            </div>
            <ul id="addedTasksList" class="added-list"></ul>
            <div id="addedTasksEmpty" class="muted-note">Няма добавени задачи за този ученик.</div>
          </section>
        </main>
        <div class="footer-hint">Навигация: клавиши ← / → за предишен/следващ • Избор от падащото меню</div>
</body>

<script>
(function(){
  // --- sessionStorage for per-skill notes (namespace per class + triplet)
  function storageKey(){
    var cls = (window.CLASS_INFO && window.CLASS_INFO.className) ? String(window.CLASS_INFO.className) : 'default-class';
    var trip = window.TRIPLET ? String(window.TRIPLET) : 'default-triplet';
    return 'assess_skillnotes::' + cls + '::' + trip;
  }
  function loadNotes(){
    try { var raw = sessionStorage.getItem(storageKey()); return raw ? JSON.parse(raw) : {}; } catch(_){ return {}; }
  }
  var NOTES = loadNotes();
  window.__SKILL_NOTES__ = NOTES; // debug: live reference
  var __saveTimer = null;
  function saveNotesDebounced(){
    try { if (__saveTimer) clearTimeout(__saveTimer); } catch(_){}
    __saveTimer = setTimeout(function(){
      try { sessionStorage.setItem(storageKey(), JSON.stringify(NOTES || {})); } catch(_e){}
      console.log('[SKNOTE] saved to sessionStorage', storageKey(), JSON.parse(sessionStorage.getItem(storageKey())||'{}'));
    }, 80);
  }
  function getSid(){
    var card = document.querySelector('main.wrap .card');
    if (!card) return null;
    var sidRaw = card.getAttribute('data-student-id');
    if (sidRaw == null || sidRaw === '') return null;
    return Number.isFinite(+sidRaw) ? +sidRaw : sidRaw; // allow numeric or string ids
  }
  function getNote(sid, key){
    return (NOTES[sid] && typeof NOTES[sid][key] === 'string') ? NOTES[sid][key] : '';
  }
  function setNote(sid, key, val){
    if (!NOTES[sid]) NOTES[sid] = {};
    NOTES[sid][key] = String(val || '');
    console.log('[SKNOTE] set', { sid: sid, key: key, val: String(val||''), snapshot: Object.assign({}, NOTES[sid]) });
    saveNotesDebounced();
  }
  function clearNote(sid, key){
    if (!NOTES[sid]) return;
    delete NOTES[sid][key];
    console.log('[SKNOTE] clear', { sid: sid, key: key, remaining: NOTES[sid] ? Object.keys(NOTES[sid]).length : 0 });
    if (Object.keys(NOTES[sid]).length === 0) delete NOTES[sid];
    saveNotesDebounced();
  }

  // Enhance current card's skill rows with inline note UI (button + input)
  function enhanceSkillRows(){
    var card = document.querySelector('main.wrap .card');
    if (!card) return;
    var sid = getSid();
    var rows = card.querySelectorAll('.skill-row');
    rows.forEach(function(row){
      // skip if already enhanced
      if (row.__enhanced_note) return;
      row.__enhanced_note = true;

      // find rating to read snippet key
      var rating = row.querySelector('.rating[data-snippet-id]');
      var key = rating ? rating.getAttribute('data-snippet-id') : null;
      if (!key) return;

      // create toggle button (…)
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'add-note-btn';
      btn.title = 'Добави/скрий бележка за това умение';
      btn.textContent = '…';

      // create input
      var inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'skill-inline-note';
      inp.placeholder = 'Бележка за това умение…';

      // initial value from storage
      if (sid != null){
        try { inp.value = getNote(sid, key); } catch(_){}
        if (inp.value) inp.style.display = 'block';
        console.log('[SKNOTE] enhance initial', { sid: sid, key: key, value: inp.value });
      }

      // toggle visibility
      btn.addEventListener('click', function(){
        if (inp.style.display === 'none' || !inp.style.display){
          inp.style.display = 'block';
          inp.focus();
          console.log('[SKNOTE] toggle show', { key: key });
        } else {
          inp.style.display = 'none';
          console.log('[SKNOTE] toggle hide', { key: key });
        }
      });

      // persist on input
      inp.addEventListener('input', function(){
        var s = getSid();
        if (s == null) return;
        var v = String(inp.value || '').trim();
        if (v) setNote(s, key, v); else clearNote(s, key);
        console.log('[SKNOTE] input', { sid: s, key: key, value: v });
      });

      // insert UI at end of row
      row.appendChild(btn);
      row.appendChild(inp);
    });
  }

  function applyNotesToCurrent(){
    var card = document.querySelector('main.wrap .card');
    if (!card) return;
    var sid = getSid();
    console.log('[SKNOTE] apply for SID', sid);
    var rows = card.querySelectorAll('.skill-row');
    rows.forEach(function(row){
      var rating = row.querySelector('.rating[data-snippet-id]');
      var key = rating ? rating.getAttribute('data-snippet-id') : null;
      var inp = row.querySelector('.skill-inline-note');
      if (!key || !inp) return;
      try {
        var v = (sid != null) ? getNote(sid, key) : '';
        inp.value = v || '';
        inp.style.display = v ? 'block' : 'none';
      } catch(_){ }
    });
  }

  function observe(){
    var card = document.querySelector('main.wrap .card');
    if (!card || !window.MutationObserver) { enhanceSkillRows(); applyNotesToCurrent(); return; }
    var mo = new MutationObserver(function(muts){
      var attrChanged = muts.some(function(m){ return m.type==='attributes' && m.attributeName==='data-student-id'; });
      var listChanged = muts.some(function(m){ return m.type==='childList'; });
      if (attrChanged || listChanged){
        enhanceSkillRows();
        applyNotesToCurrent();
      }
    });
    mo.observe(card, { attributes:true, attributeFilter:['data-student-id'], childList:true, subtree:true });
  }

  document.addEventListener('DOMContentLoaded', function(){
    // Initial pass (after list renders)
    setTimeout(function(){
      console.log('[SKNOTE] DOM ready — notes key:', storageKey());
      enhanceSkillRows(); applyNotesToCurrent(); observe();
    }, 0);
  });
})();
</script>
<script>
(function(){
  // Muted solid colors for the hero bar
  var COLORS = ['#fde8e8','#fef3c7','#e0f2fe','#dcfce7','#ede9fe','#cffafe','#e9d5ff','#ffedd5'];
  var lastIdx = -1; // remember only the last shown color index (not per student)

  function getHero(){ return document.getElementById('hero'); }

  function nextColor(){
    // cycle so the color never repeats immediately, even when returning to a previous card
    var idx = (lastIdx + 1) % COLORS.length;
    lastIdx = idx;
    return COLORS[idx];
  }

  function applyNewHeroColor(){
    var hero = getHero(); if (!hero) return;
    hero.style.background = nextColor();
  }

  function observeCardSwitch(){
    var card = document.querySelector('main.wrap .card');
    if (!card || !window.MutationObserver){ applyNewHeroColor(); return; }
    var mo = new MutationObserver(function(muts){
      var changed = muts.some(function(m){ return m.type==='attributes' && m.attributeName==='data-student-id'; });
      if (changed) applyNewHeroColor();
    });
    mo.observe(card, { attributes:true, attributeFilter:['data-student-id'] });
  }

  document.addEventListener('DOMContentLoaded', function(){
    // initial paint
    applyNewHeroColor();
    // then react to card switches
    observeCardSwitch();
  });
})();
</script>
<script>
// Guard submit: do not allow submission if nothing is assessed
(function(){
  // exposed flag so the close logic knows whether to close
  window.__ASSESS_CAN_CLOSE__ = false;

  function hasAnyAssessment(){
    // any selected rating pill
    if (document.querySelector('.pill.is-active')) return true;
    // any task ratings (if such UI exists)
    if (document.querySelector('.task-rating .pill.is-active')) return true;
    return false;
  }

  function guardSubmit(e){
    // If nothing is chosen, cancel the submit flow entirely
    if (!hasAnyAssessment()){
      e.preventDefault();
      if (e.stopImmediatePropagation) e.stopImmediatePropagation();
      if (e.stopPropagation) e.stopPropagation();
      window.__ASSESS_CAN_CLOSE__ = false;
      alert('Няма въведени оценки. Нищо няма да бъде записано.');
      return false;
    }
    // allow other handlers (submitAsmt.js) to run
    window.__ASSESS_CAN_CLOSE__ = true;
    return true;
  }

  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.getElementById('submitAssessBtn');
    if (btn){
      // Use capture so we intercept before other listeners
      btn.addEventListener('click', guardSubmit, {capture:true});
    }
  });
})();
</script>
<script>
// Close the popup window after submitting (only if guard allowed)
(function(){
  function closeAfterSubmit(){
    if (!window.__ASSESS_CAN_CLOSE__) return; // do not close when blocked
    setTimeout(function(){
      try { window.close(); } catch(e) {}
    }, 700);
  }
  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.getElementById('submitAssessBtn');
    if (btn) btn.addEventListener('click', closeAfterSubmit, { capture:false });
  });
})();
</script>
