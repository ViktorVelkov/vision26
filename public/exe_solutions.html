<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>File Upload Panel</title>
    <link rel="stylesheet" href="styles.css" />
<style>
.ysn-root { right:auto !important; left:16px !important; }
.ysn-root .ysn-panel{ left:0 !important; right:auto !important; }
    body {
        background-color: #F5FFFA;
    }
    body {
        font-family: sans-serif;
        margin: 0;
        padding: 0;
    }

    .switch-container {
        display: flex;
        width: 100%;
        margin: 10px auto;
        justify-content: center;
    }

    .switch-btn {
        flex: 1;
        padding: 14px;
        font-size: 18px;
        border: 1px solid #ccc;
        cursor: pointer;
        background-color: white;
        font-weight: bold;
    }

        .switch-btn.active {
            background-color: #cce7ff;
            border-bottom: 3px solid #007bff;
        }

        .upload-layout{
        display: flex;
        gap: 40px;
        margin-top: 30px;
    }

    .upload-wrapper {
        display: flex;
        justify-content: space-between;
        gap: 40px;
        padding: 20px;
    }

    .upload-left {
        flex: 1;
    }

    .upload-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

        .upload-right input {
            width: 100%;
            padding: 8px 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f0f0f0;
            color: #555;
        }

            .upload-right input[readonly] {
                cursor: not-allowed;
            }

    .upload-box {
        margin-bottom: 30px;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: white;
    }

    .upload-btn {
        margin-top: 10px;
        padding: 8px 16px;
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
    }

        .upload-btn:hover {
            background-color: #0056b3;
        }
    .input-row {
        display: flex;
        flex-direction: row;
        gap: 10px; /* space between inputs */
        margin-top: 10px;
    }

        .input-row input {
            flex: 1; /* both take equal space */
            padding: 6px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
    .form-group {
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
    }

        .form-group input,
        .form-group select {
            padding: 6px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
</style>

</head>
<body>
    <script>
        document.querySelectorAll('.switch-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const mode = btn.getAttribute('data-mode');

            document.getElementById('uploadSection').style.display = mode === 'upload' ? 'block' : 'none';
            document.getElementById('manageSection').style.display = mode === 'manage' ? 'block' : 'none';
  });
});

    </script>
    <!-- View Switch -->
    <div id="viewSwitch" class="switch-container">
        <button class="switch-btn active" data-mode="upload">Upload File</button>
        <button class="switch-btn" data-mode="manage">Manage Records</button>
    </div>

    <!-- Upload Form Section -->
    <div id="uploadSection">
        <!-- Upload form will go here -->
        <div class="upload-layout">
            <!-- Left side: two upload sections -->
            <div class="upload-left">
                <div class="upload-box">
                    <label for="file1">Качване на условие:</label>
                    <input type="file" id="file1" name="fileA" />
                    <button windth="50px" height="50px" id="fileClear1">Clear</button><br>
                </div>

                <div class="upload-box">
                    <label for="file2">Качване на решение:</label>
                    <input type="file" id="file2" name="fileB" />
                    <button windth="50px" height="50px" id="fileClear2">Clear</button><br>

                </div>
                <br><br>
                <button id="uploadBtnB" class="uploadBtnB" style="width:500px">Напред</button>

            </div>

            <!-- Right side:  -->
            <div class="upload-right">
                <textarea id="name" rows="1" readonly placeholder="Име(съставно):"></textarea>
                <div>
                    <input type="text" id="Number" placeholder="Задача Номер" />
                    <input type="text" id="Page" placeholder="Страница" />
                    <select id="keywordDropdown">
                        <option disabled selected>-- Избери ресурс --</option>
                    </select>
                    <div class="form-group">
                        <label for="classField">Клас:</label>
                        <input type="text" id="classField" placeholder="Enter class" />
                        <!-- <button id="uploadBtnA" class="uploadBtnA">Генерирай име</button> -->
                    </div>

                    <div class="form-group">
                        <label for="altText">URL за снимка на условието(алтернативен):</label>
                        <input type="text" id="altText" placeholder="URL for text" />
                    </div>

                    <div class="form-group">
                        <label for="altSolution">URL за снимка на решението(алтернативен):</label>
                        <input type="text" id="altSolution" placeholder="URL for solution" />
                    </div>

                    <div class="form-group">
                        <label for="difficulty">Трудност:</label>
                        <select id="difficulty">
                            <option value="1">1 - Лесно</option>
                            <option value="2">2 - Средно</option>
                            <option value="3">3 - Трудно</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dateLastSolved">Последно решаван на:</label>
                        <input type="date" id="dateLastSolved" />
                    </div>

                    <div class="form-group">
                        <label for="dateForRevision">Дата за преговор:</label>
                        <input type="date" id="dateForRevision" />
                    </div>
                    <div class="form-group">
                        <label for="comments">Коментари:</label>
                        <textarea id="comments" placeholder="Добави коментар" rows="3"></textarea>
                    </div>
                    <!-- НОВО: Тема (text) -->
                    <div class="form-row">
                    <label for="ex_topic">Тема</label>
                    <input type="text" id="ex_topic" name="topic" placeholder="напр. Квадратни уравнения">
                    </div>

                    <!-- НОВО: Ключови думи (comma-separated -> text[]) -->
                    <div class="form-row">
                    <label for="ex_keywords">Ключови думи</label>
                    <input type="text" id="ex_keywords" name="keyWords" placeholder="напр. дискриминанта, Виет, квадратен триномин">
                    <small class="hint">**Разделяй със запетаи.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Manage Files Section -->
    <div id="manageSection" style="display: none;">
            
         
        <div class="upload-layout">
            <!-- Left side: two manage sections -->
            <div class="manage-left">
                <div>
                   
                    <input type="text" id="Number_MR" placeholder="Задача Номер" /><br>
                    <input type="text" id="Page_MR" placeholder="Страница" /><br>
                    <select id="keywordDropdown_MR">
                        <option disabled selected>-- Избери ресурс --</option>
                    </select><br>
                    <div><button id="searchBtnA" style="width:300px">Search</button><button id="clear_MR" style="width:300px">Clear</button></div><br>
                    
                    <!-- 
                    <h5>Полета за промяна:</h5>
                    <div class="upload-box">
                         <label for="file1">Качване на условие:</label>
                        <input type="file" id="file1" name="fileA" /><br>
                    </div>
                    <input type="text" id="difficulty_MR" placeholder="Сложност" />
                    <div class="form-group">
                        <label for="dateLastSolved">Последно решаван на:</label>
                        <input type="date" id="dateLastSolved" />
                    </div>
</style>
<style>
  /* Page-specific override: place sticky notes on the left for exe_solutions */
  .ysn-root{ right:auto !important; left:16px !important; }
</style>
                    <div class="form-group">
                        <label for="dateForRevision">Дата за преговор:</label>
                        <input type="date" id="dateForRevision" />
                    </div>
                    <div class="form-group">
                        <label for="comments">Коментари:</label>
                        <textarea id="comments" placeholder="Добави коментар" rows="3"></textarea>
                    </div>
-->

                    <table id="manageTable" border="1" style="margin-top: 1rem; border-collapse: collapse; width: 100%;">
                        <thead style="background-color: #cce5ff;">
                            <tr>
                            <th>ID</th>
                            <th>Page</th>
                            <th>Number</th>
                            <th>SourceID</th>
                            <th>Date Last Solved</th>
                            <th>Date for Revision</th>
                            <th>Comments</th>
                            <th>Solution</th>
                            <th>Text</th>
                            <!-- <th>Multiple Solutions</th>. -->
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                            <td data-id="1">1</td>
                            <td data-field="Page" data-id="1" data-original = "empty"></td>
                            <td data-field="Number" data-id="1" data-original = "empty">empty</td>
                            <td data-field="ResourceID" data-id="1" data-original = "empty">empty</td>
                            <!-- <td data-field="date_last_solved" data-id="1" contenteditable="true" data-original = "empty">empty</td> -->
                             <td>
                                <div 
                                contenteditable="true"
                                class="editable"
                                data-field="date_last_solved"
                                data-id="${exercise.ID}"
                                data-original="${solvedDates}"
                                >${solvedDates}</div>
                                <input 
                                type="date"
                                id="inputDateSolved"
                                class="datePicker"
                                data-id="${exercise.ID}"
                                data-target="date_last_solved"
                                style="margin-top: 4px;"
                                />
                            </td>
                            <!-- <td data-field="for_revision" data-id="1" contenteditable="true" data-original = "empty">empty</td> -->
                             <td>
                                <div 
                                contenteditable="true"
                                class="editable"
                                data-field="for_revision"
                                data-id="${exercise.ID}"
                                data-original="${solvedDates}"
                                >${}</div>
                                <input 
                                type="date"
                                id = "inputRevision"
                                class="datePicker"
                                data-id="${exercise.ID}"
                                data-target="for_revision"
                                style="margin-top: 4px;"
                                />
                            </td>
                            <td data-field="comments"
                                id="commentsID"
                                data-id="${exercise.ID}"
                                contenteditable="true"
                                data-original='empty'>
                                empty
                            </td>
                            <td data-field="solutions_MR"
                                id="has_solution"
                                data-id="${exercise.ID}"
                                contenteditable="true"
                                data-original='empty'>
                                empty
                            </td>
                            <td data-field="hasText"
                                id="hasTextID"
                                data-id="${exercise.ID}"
                                contenteditable="true"
                                data-original='empty'>
                                empty<br><input type="file"
                                            class="uploadInput_MR"
                                            data-id="${exercise.ID}"
                                            data-type="assignmentCondition"
                                            style="margin-top: 4px;" 
                                            placeholder=""/>
                            </td>
                            <!-- <td data-field="multiple_solutions" data-id="1" contenteditable="true">1</td> -->
                            </tr>

                        </tbody>
                    </table>
                    <button id="saveAllBtn">Save Changes</button>
                </div>
            </div>


            
        </div>
    </div>
   
    <script src="exe_solutions.js"></script>
    <script>
  window.YSN_KEY = 'exe_solutions';
</script>
<script src="/yellowStickyNotes.js"></script>
</body>

</html>
