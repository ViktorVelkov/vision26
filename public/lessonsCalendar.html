<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    h1 { margin: 0 0 16px; font-size: 22px; }
    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .toolbar input, .toolbar select, .toolbar button { padding: 6px 10px; font-size: 14px; }
    .table-container {
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: auto;
      max-height: 600px;
      max-width: 100%;
    }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    thead th { position: sticky; top: 0; background: #f4f6f8; border-bottom: 1px solid #e1e5ea; text-align: left; padding: 8px; }
    tbody td { border-bottom: 1px solid #f0f2f5; padding: 8px; }

    /* Zebra striping and hover rules removed */

    /* Force single-line display with ellipsis for all cells */
    #resultsTable th,
    #resultsTable td {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status { margin-top: 8px; font-size: 12px; color: #555; }
    .hidden { display: none; }

    /* Make the notes column wider in the main table */
    #resultsTable th.notes-col,
    #resultsTable td.notes-col {
      min-width: 300px;
      max-width: 500px;
    }

    /* Flash green on successful save */
    .success-flash {
      background-color: #e6f4ea !important; /* soft green */
      transition: background-color 0.8s ease;
    }

    /* Collapse actions column when table has .hide-actions */
    table.hide-actions thead th:first-child,
    table.hide-actions tbody td:first-child {
      display: none;
    }
  </style>
</head>
<body>
  <div class="table-container">
    <table id="resultsTable">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="toolbar" id="weekToolbar" style="margin: 8px 0;">
    <button id="prevWeekBtn" title="Previous week">◀</button>
    <label for="weekNumberInput">Week</label>
    <input id="weekNumberInput" type="number" min="1" step="1" style="width: 72px;" />
    <button id="nextWeekBtn" title="Next week">▶</button>
    <button id="addRowBtn" title="Добави нов ред">+ Ред</button>
    <button id="toggleActionsBtn" title="Покажи/скрий колоната с действия">Покажи действия</button>
  </div>

  <h2 style="margin-top:16px; font-size:18px;">Библиотека уроци</h2>
  <div class="status" id="status"></div>
  <div class="toolbar" style="margin: 8px 0;">
    <a href="/lessonsLibrary.html" id="openLessonsLibraryLink" style="
      display:inline-block; background:#2563eb; color:#fff; text-decoration:none; padding:8px 14px; border-radius:8px; font-weight:600;">
      Отиди към Lessons Library →
    </a>
  </div>
 

  <script>
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');
    const statusEl = document.getElementById('status');

    function flashSaved(cell){
      if (!cell) return;
      cell.classList.add('success-flash');
      setTimeout(()=> cell.classList.remove('success-flash'), 900);
    }

    const weekToolbar = document.getElementById('weekToolbar');
    const prevWeekBtn = document.getElementById('prevWeekBtn');
    const nextWeekBtn = document.getElementById('nextWeekBtn');
    const weekNumberInput = document.getElementById('weekNumberInput');
    const addRowBtn = document.getElementById('addRowBtn');
    const toggleActionsBtn = document.getElementById('toggleActionsBtn');
    const resultsTable = document.getElementById('resultsTable');
    let currentWeek = 1;

    // Helper: HTTP helpers
    async function apiShiftDate(id, days){
      const res = await fetch(`/lessons-calendar/generatedyearplan/${id}/shift-date`, {
        method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ days })
      });
      if(!res.ok) throw new Error('shift-date failed');
      return res.json();
    }
    async function apiShiftSequence(id, dir){
      const res = await fetch(`/lessons-calendar/generatedyearplan/${id}/shift-sequence`, {
        method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ dir })
      });
      if(!res.ok) throw new Error('shift-sequence failed');
      return res.json();
    }
    async function apiDeleteRow(id){
      const res = await fetch(`/generatedyearplan/${id}`, { method: 'DELETE' });
      if(!res.ok) throw new Error('delete failed');
      return res.json();
    }
    async function apiMergeRows(sourceId, targetId, strategy){
      const res = await fetch('/lessons-calendar/generatedyearplan/merge', {
        method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ sourceId, targetId, strategy })
      });
      if(!res.ok) throw new Error('merge failed');
      return res.json();
    }
    async function apiCreateRow(payload){
      const res = await fetch('/generatedyearplan', {
        method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify(payload)
      });
      if(!res.ok) throw new Error('create failed');
      return res.json();
    }


    // Helper to send PATCH for cell update
    async function updateCell(id, column, value){
      try{
        const body = {};
        body[column] = value;   // instead of { column, value }
        const res = await fetch(`/generatedyearplan/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if(!res.ok){
          const t = await res.text();
          throw new Error(`HTTP ${res.status} ${t}`);
        }
        return await res.json();
      }catch(err){
        console.error('Update failed:', err);
        statusEl.textContent = 'Update failed. See console.';
        throw err;
      }
    }

    function renderTable(rows){
      tbody.innerHTML = '';
      thead.innerHTML = '';
      if(!rows || rows.length === 0){
        statusEl.textContent = 'No rows found.';
        return;
      }
      const cols = Object.keys(rows[0]);
      const hiddenCols = ['id', 'term'];
      const displayCols = cols.filter(c => !hiddenCols.includes(c));

      // Reorder 'duration' to appear immediately after 'end_time'
      // and move 'notes' to be the last column
      const displayColsOrdered = (() => {
        const arr = [...displayCols];
        const di = arr.indexOf('duration');
        const ei = arr.indexOf('end_time');
        if (di !== -1 && ei !== -1 && di !== ei + 1) {
          arr.splice(di, 1);
          arr.splice(ei + 1, 0, 'duration');
        }
        const ni = arr.indexOf('notes');
        if (ni !== -1 && ni !== arr.length - 1) {
          arr.splice(ni, 1);
          arr.push('notes');
        }
        return arr;
      })();

      // Build header using ordered columns
      const trh = document.createElement('tr');
      // actions column header
      const thAct = document.createElement('th');
      thAct.textContent = '✦';
      trh.appendChild(thAct);
      displayColsOrdered.forEach(c => {
        const th = document.createElement('th');
        th.textContent = c;
        if (c === 'notes') {
          th.classList.add('notes-col');
          th.style.minWidth = '300px';
        }
        trh.appendChild(th);
      });
      thead.appendChild(trh);

      // Editable columns: make all visible columns editable
      const editableCols = [...displayColsOrdered];

      // Build body using ordered columns
      for(const r of rows){
        const tr = document.createElement('tr');
        if (r.id != null) tr.dataset.id = String(r.id);
        // Actions cell
        const tdAct = document.createElement('td');
        tdAct.style.whiteSpace = 'nowrap';
        tdAct.style.userSelect = 'none';
        tdAct.innerHTML = `
          <button class="btn-move-left"  title="Move back one day">⟵</button>
          <button class="btn-move-right" title="Move forward one day">⟶</button>
          <button class="btn-merge"      title="Merge into…">⇄</button>
          <button class="btn-duplicate"  title="Duplicate as new row">＋</button>
          <button class="btn-delete"     title="Delete row">🗑️</button>
        `;
        // Wire actions
        tdAct.querySelector('.btn-move-left').addEventListener('click', async ()=>{
          try{ await apiShiftSequence(r.id, 'prev'); flashSaved(tdAct); loadData(currentWeek); }
          catch(e){ console.error(e); alert('No previous date to shift to'); }
        });
        tdAct.querySelector('.btn-move-right').addEventListener('click', async ()=>{
          try{ await apiShiftSequence(r.id, 'next'); flashSaved(tdAct); loadData(currentWeek); }
          catch(e){ console.error(e); alert('No next date to shift to'); }
        });
        tdAct.querySelector('.btn-delete').addEventListener('click', async ()=>{
          if(!confirm('Delete this lesson?')) return;
          try{ await apiDeleteRow(r.id); loadData(currentWeek); }catch(e){ console.error(e); }
        });
        tdAct.querySelector('.btn-merge').addEventListener('click', async ()=>{
          const target = prompt('Merge INTO target row id:');
          if(!target) return;
          const tid = parseInt(target,10);
          if(!Number.isInteger(tid)) return alert('Invalid id');
          try{ await apiMergeRows(r.id, tid, 'append-notes'); flashSaved(tdAct); loadData(currentWeek); }catch(e){ console.error(e); alert('Merge failed'); }
        });
        tdAct.querySelector('.btn-duplicate').addEventListener('click', async ()=>{
          try{
            const payload = {
              week_number: r.week_number || currentWeek,
              date: r.date || null,
              weekday: r.weekday || null,
              start_time: r.start_time || null,
              end_time: r.end_time || null,
              subject: r.subject || null,
              unit: r.unit || null,
              // sectioninfo removed for duplication
              unitetype: r.unitetype || null,
              notes: r.notes || null,
              duration: r.duration || null,
              is_module: r.is_module || null,
              term: r.term || null,
              lessonCreated: r.lessonCreated || null,
              lessonCode: r.lessonCode || null
            };
            await apiCreateRow(payload);
            loadData(currentWeek);
          }catch(e){ console.error(e); alert('Create failed'); }
        });
        tr.appendChild(tdAct);
        displayColsOrdered.forEach(c => {
          const td = document.createElement('td');
          let v = r[c];
          if (c === 'date' && v) {
            // Keep as YYYY-MM-DD if present; avoid Date() timezone shifts
            const m = String(v).match(/^(\d{4}-\d{2}-\d{2})/);
            v = m ? m[1] : String(v);
          }
          if (c === 'lessonCreated') {
            const setDisplay = (val) => {
              if (val === true) {
                td.textContent = '✔️';
                td.style.color = 'green';
                td.style.backgroundColor = '#e6f4ea';
                td.style.fontWeight = 'bold';
              } else if (val === false) {
                td.textContent = '✖️';
                td.style.color = 'red';
                td.style.backgroundColor = '#fdecea';
                td.style.fontWeight = 'bold';
              } else {
                td.textContent = '';
                td.style.color = '';
                td.style.backgroundColor = '';
                td.style.fontWeight = '';
              }
            };
            setDisplay(v);
            td.style.cursor = 'pointer';
            td.dataset.col = c;
            td.dataset.id = r.id;
            td.title = 'Click to toggle: empty → ✔️ → ✖️';
            td.addEventListener('click', async ()=>{
              const current = (td.textContent === '✔️') ? true : (td.textContent === '✖️') ? false : null;
              const next = (current === null) ? true : (current === true) ? false : null;
              statusEl.textContent = 'Saving...';
              try{
                await updateCell(td.dataset.id, 'lessonCreated', next);
                setDisplay(next);
                flashSaved(td);
                statusEl.textContent = 'Saved';
              }catch(e){ }
            });
          } else {
            td.textContent = v == null ? '' : v;
            td.title = v == null ? '' : String(v);
          }

          if (c === 'notes') {
            td.classList.add('notes-col');
            td.style.minWidth = '300px';
          }

          if (editableCols.includes(c) && c !== 'lessonCreated'){
            td.contentEditable = 'true';
            td.dataset.col = c;
            td.dataset.id = r.id;
            td.addEventListener('keydown', (e)=>{
              if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                td.blur();
              }
            });
            td.addEventListener('blur', async ()=>{
              const wants = td.textContent; // keep exact user text including newlines
              if(!td.dataset.id){
                console.warn('No id for row, cannot update');
                return;
              }
              statusEl.textContent = 'Saving...';
              try{
                const resp = await updateCell(td.dataset.id, td.dataset.col, wants);
                const saved = (resp && typeof resp.value !== 'undefined') ? resp.value : wants;
                td.textContent = saved == null ? '' : saved;
                flashSaved(td);
                statusEl.textContent = 'Saved';
              }catch{}
            });
          }

          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }
      statusEl.textContent = `Loaded ${rows.length} row(s).`;
    }


    async function loadData(weekArg){
      try{
        const w = (typeof weekArg === 'number' && !Number.isNaN(weekArg)) ? weekArg : currentWeek;
        const res = await fetch('/lessons-calendar/generatedyearplan' + (w ? ('?week=' + encodeURIComponent(w)) : ''));
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        renderTable(data);
        currentWeek = w;
        if (weekNumberInput) weekNumberInput.value = String(currentWeek);
      }catch(err){
        console.error(err);
        statusEl.textContent = 'Error loading data. See console.';
      }
    }
    if (prevWeekBtn) prevWeekBtn.addEventListener('click', ()=>{
      const nextW = Math.max(1, (parseInt(weekNumberInput.value || currentWeek, 10) || 1) - 1);
      loadData(nextW);
    });
    if (nextWeekBtn) nextWeekBtn.addEventListener('click', ()=>{
      const nextW = (parseInt(weekNumberInput.value || currentWeek, 10) || 1) + 1;
      loadData(nextW);
    });
    if (weekNumberInput) weekNumberInput.addEventListener('keydown', (e)=>{
      if (e.key === 'Enter') {
        const val = parseInt(weekNumberInput.value, 10);
        if (!Number.isNaN(val) && val > 0) loadData(val);
      }
    });
    if (weekNumberInput) weekNumberInput.addEventListener('blur', ()=>{
      const val = parseInt(weekNumberInput.value, 10);
      if (!Number.isNaN(val) && val > 0) loadData(val);
    });

    // Default: collapse actions column and set toggle label
    if (resultsTable && !resultsTable.classList.contains('hide-actions')) {
      resultsTable.classList.add('hide-actions');
    }
    if (toggleActionsBtn) {
      const updateToggleLabel = () => {
        toggleActionsBtn.textContent = resultsTable.classList.contains('hide-actions')
          ? 'Покажи действия'
          : 'Скрий действия';
      };
      updateToggleLabel();
      toggleActionsBtn.addEventListener('click', () => {
        resultsTable.classList.toggle('hide-actions');
        updateToggleLabel();
      });
    }

    // Initial loads
    if (weekNumberInput) weekNumberInput.value = String(currentWeek);
    loadData(currentWeek);

    if (addRowBtn) addRowBtn.addEventListener('click', async ()=>{
      try{
        await apiCreateRow({ week_number: currentWeek, notes: '', lessonCreated: false });
        loadData(currentWeek);
      }catch(e){ console.error(e); alert('Failed to add row'); }
    });
  </script>
  <script src="/lesCal_tableMod.js" defer></script>
</body>
</html>
